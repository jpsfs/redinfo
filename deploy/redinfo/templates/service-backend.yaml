apiVersion: v1
kind: Service
metadata:
  name: {{ include "redinfo.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "redinfo.name" . }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.backend.type }}
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "redinfo.name" . }}
    app.kubernetes.io/component: backend
