apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redinfo.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: {{ include "redinfo.name" . }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "redinfo.name" . }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "redinfo.name" . }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - containerPort: 80
          env:
{{ toYaml .Values.env.frontend | indent 12 }}
          resources:
{{ toYaml .Values.resources.frontend | indent 12 }}
