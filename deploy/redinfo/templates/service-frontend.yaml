apiVersion: v1
kind: Service
metadata:
  name: {{ include "redinfo.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: {{ include "redinfo.name" . }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "redinfo.name" . }}
    app.kubernetes.io/component: frontend
