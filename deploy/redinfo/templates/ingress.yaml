{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "redinfo.fullname" . }}-ingress
  annotations:
{{ toYaml .Values.ingress.annotations | indent 4 }}
spec:
  rules:
{{- $root := . -}}
{{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
{{- range .paths }}
          {{- $path := . -}}
          {{- $svcName := $path.serviceName }}
          {{- if not $svcName }}
            {{- $svc := default "frontend" $path.service }}
            {{- $svcName = printf "%s-%s" (include "redinfo.fullname" $root) $svc }}
          {{- end }}
          - path: {{ $path.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $path.servicePort }}
{{- end }}
{{- end }}
  tls:
{{ toYaml .Values.ingress.tls | indent 4 }}
{{- end }}
