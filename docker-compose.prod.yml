# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: redinfo

services:
  postgres:
    restart: always
    # Do NOT expose DB port in production

  backend:
    build:
      target: prod
    restart: always
    environment:
      NODE_ENV: production
      FRONTEND_URL: http://localhost
    # Entrypoint in the image handles: prisma migrate deploy → node dist/main
    expose:
      - "3000"

  frontend:
    build:
      target: prod
      args:
        VITE_API_URL: /api
    restart: always
    ports:
      - "80:80"
      - "443:443"    # TLS termination to be handled externally (e.g. Traefik / certbot)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
