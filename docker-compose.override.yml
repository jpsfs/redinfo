# Development overrides — applied automatically by Docker Compose
# Adds source volume mounts for hot-reload on both services

name: redinfo

services:
  postgres:
    ports:
      - "5432:5432"  # expose DB port locally for tools like DBeaver / Prisma Studio

  backend:
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/prisma:/app/packages/backend/prisma
      - ./packages/shared/src:/app/packages/shared/src
      # Named volume to avoid overwriting container node_modules
      - backend_node_modules:/app/node_modules
      - backend_pkg_node_modules:/app/packages/backend/node_modules

  frontend:
    volumes:
      - ./packages/frontend/src:/app/packages/frontend/src
      - ./packages/frontend/index.html:/app/packages/frontend/index.html
      - ./packages/frontend/vite.config.ts:/app/packages/frontend/vite.config.ts
      - ./packages/shared/src:/app/packages/shared/src
      - frontend_node_modules:/app/node_modules
      - frontend_pkg_node_modules:/app/packages/frontend/node_modules

volumes:
  backend_node_modules:
  backend_pkg_node_modules:
  frontend_node_modules:
  frontend_pkg_node_modules:
