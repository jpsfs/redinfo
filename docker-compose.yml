# Base Compose — shared service definitions
# ─────────────────────────────────────────────────────────────────────────────
# Development:  docker compose up
# Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# ─────────────────────────────────────────────────────────────────────────────

name: redinfo

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-redinfo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redinfo_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-redinfo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redinfo} -d ${POSTGRES_DB:-redinfo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (NestJS) ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      target: dev
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-redinfo}:${POSTGRES_PASSWORD:-redinfo_dev_password}@postgres:5432/${POSTGRES_DB:-redinfo}
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ── Frontend (React + Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      target: dev
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
